<!--
  Local override of the theme's favicons include.

  This site ships the older realfavicongenerator icon set (16/32 px PNG,
  apple-touch, android-chrome, .ico) rather than the newer favicon.svg /
  favicon-96x96 set the stock theme expects. This file references only the
  icons that actually exist, so no favicon request 404s.
-->

{% capture favicon_path %}{{ '/assets/img/favicons' | relative_url }}{% endcapture %}

<link rel="icon" type="image/png" sizes="96x96" href="{{ favicon_path }}/favicon-96x96.png">
<link rel="icon" type="image/png" sizes="32x32" href="{{ favicon_path }}/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="{{ favicon_path }}/favicon-16x16.png">
<link rel="shortcut icon" href="{{ favicon_path }}/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="{{ favicon_path }}/apple-touch-icon.png">
{% if site.pwa.enabled %}
  <link rel="manifest" href="{{ favicon_path }}/site.webmanifest">
{% endif %}
